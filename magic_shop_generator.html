<!DOCTYPE html>

<title>5e Magic Shop Generator</title>

<style>

    --border:#3a2e1a;--border-gold:#5a4520;
    --text:#e8dcc4;--text-muted:#9a8a6a;--text-dim:#5a4f3a;
    --mundane:#aaaaaa;--common:#b0c4de;--uncommon:#7ec47e;
    --rare:#7eb8e8;--very-rare:#c47ee8;--legendary:#e8a050;
    --radius:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg-dark);color:var(--text);font-family:'Crimson Text',Georgia,serif;font-size:16px;min-height:100vh;}
  .page-bg{background:radial-gradient(ellipse at 20% 0%,rgba(120,80,20,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 100%,rgba(80,40,10,.12) 0%,transparent 60%);min-height:100vh;padding:0 0 4rem;}
  header{border-bottom:1px solid var(--border-gold);padding:2rem 2rem 1.5rem;text-align:center;position:relative;}
  header::before{content:'';position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(to right,transparent,var(--gold),transparent);}
  h1{font-family:'Cinzel',serif;font-size:2rem;font-weight:700;color:var(--gold-light);letter-spacing:.08em;text-shadow:0 0 30px rgba(200,160,60,.3);}
  .subtitle{font-style:italic;color:var(--text-muted);margin-top:.25rem;font-size:1rem;}
  .main-layout{display:grid;grid-template-columns:315px 1fr;gap:0;max-width:1200px;margin:0 auto;padding:1.5rem;align-items:start;}
  @media(max-width:800px){.main-layout{grid-template-columns:1fr;}}
  .sidebar{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;position:sticky;top:1rem;}
  .sec-title{font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;border-bottom:1px solid var(--border);padding-bottom:.5rem;margin-bottom:.85rem;margin-top:1.2rem;}
  .sec-title:first-child{margin-top:0;}
  .preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1rem;}
  .preset-btn{background:var(--bg-card2);border:1px solid var(--border);color:var(--text-muted);padding:.4rem .5rem;border-radius:var(--radius);cursor:pointer;font-family:'Crimson Text',serif;font-size:.85rem;transition:all .15s;text-align:center;}
  .preset-btn:hover{border-color:var(--gold-dim);color:var(--gold-light);background:rgba(120,80,20,.2);}
  .rarity-block{margin-bottom:.8rem;}
  .rarity-row{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .rlabel{width:78px;font-size:.85rem;flex-shrink:0;}
  .rlabel.mundane{color:var(--mundane);}
  .rlabel.common{color:var(--common);}
  .rlabel.uncommon{color:var(--uncommon);}
  .rlabel.rare{color:var(--rare);}
  .rlabel.very-rare{color:var(--very-rare);}
  .rlabel.legendary{color:var(--legendary);}
  .dice-input{flex:1;background:var(--bg-dark);border:1px solid var(--border);color:var(--text);padding:.3rem .6rem;border-radius:4px;font-family:'Crimson Text',serif;font-size:.9rem;min-width:0;}
  .dice-input:focus{outline:none;border-color:var(--gold-dim);}
  .dice-input.invalid{border-color:#c45050;}
  .dice-hints{display:flex;gap:3px;flex-wrap:wrap;padding-left:86px;}
  .hbtn{background:var(--bg-dark);border:1px solid var(--border);color:var(--text-dim);padding:.15rem .38rem;border-radius:3px;cursor:pointer;font-size:.7rem;font-family:'Crimson Text',serif;transition:all .1s;}
  .hbtn:hover{border-color:var(--gold-dim);color:var(--text-muted);}
  .potions-row{display:flex;align-items:center;gap:10px;margin:.75rem 0;font-size:.9rem;color:var(--text-muted);}
  .potions-row input{accent-color:var(--gold-dim);width:14px;height:14px;}
  .markup-row{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;font-size:.85rem;color:var(--text-muted);}
  .markup-row input[type=range]{flex:1;accent-color:var(--gold-dim);}
  .mval{width:44px;text-align:right;font-family:'Cinzel',serif;font-size:.8rem;color:var(--gold);}
  .tog{font-size:.8rem;color:var(--gold-dim);cursor:pointer;text-decoration:underline;display:inline-block;margin-bottom:.5rem;}
  .tog:hover{color:var(--gold);}
  .adv{display:none;}
  .adv.open{display:block;}
  .check-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-bottom:.75rem;}
  .ci{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:.85rem;color:var(--text-muted);user-select:none;}
  .ci input{accent-color:var(--gold-dim);width:13px;height:13px;}
  .gen-btn{width:100%;background:linear-gradient(to bottom,rgba(120,80,20,.5),rgba(80,50,10,.5));border:1px solid var(--gold-dim);color:var(--gold-light);padding:.75rem 1rem;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:.9rem;letter-spacing:.1em;cursor:pointer;margin-top:1.25rem;transition:all .15s;}

  .rt{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);letter-spacing:.05em;}
  .rc{font-size:.85rem;color:var(--text-dim);font-style:italic;}
  .empty{background:var(--bg-card);border:1px dashed var(--border);border-radius:var(--radius);padding:3rem 2rem;text-align:center;color:var(--text-dim);font-style:italic;font-size:1.05rem;}

  .rsec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}

  .bc{color:var(--common);border-color:#5a7a8a;}
  .bu{color:var(--uncommon);border-color:#4a8a4a;}
  .br{color:var(--rare);border-color:#4a6a9a;}
  .bvr{color:var(--very-rare);border-color:#7a4a9a;}
  .bl{color:var(--legendary);border-color:#9a6a2a;}
  .ig{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:10px;}
  .icard{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem 1rem;transition:border-color .15s;}
  .icard:hover{border-color:var(--border-gold);}
  .iname{font-size:.95rem;font-weight:600;color:var(--text);margin-bottom:.15rem;line-height:1.3;}
  .iname a{color:inherit;text-decoration:none;border-bottom:1px dotted var(--gold-dim);transition:color .1s;}
  .iname a:hover{color:var(--gold-light);border-bottom-color:var(--gold);}

<div class="page-bg">
<header>
  <h1>⚔ Magic Shop Generator</h1>
  <div class="subtitle">D&D 5th Edition — type a number or dice expression like <em>2d4-2</em></div>
</header>
<div class="main-layout">
  <div class="sidebar">
    <div class="sec-title">Presets</div>
    <div class="preset-grid">
      <button class="preset-btn" onclick="applyPreset('village')">Village</button>
      <button class="preset-btn" onclick="applyPreset('smalltown')">Small Town</button>
      <button class="preset-btn" onclick="applyPreset('largetown')">Large Town</button>
      <button class="preset-btn" onclick="applyPreset('smallcity')">Small City</button>
      <button class="preset-btn" onclick="applyPreset('largecity')">Large City</button>
      <button class="preset-btn" onclick="applyPreset('general')">General Store</button>
    </div>
    <div class="sec-title">Item Counts</div>
    <div id="rarity-inputs"></div>
    <div class="potions-row">
      <input type="checkbox" id="addPotions">
      <label for="addPotions">Add Potions of Healing</label>
    </div>
    <div class="sec-title">Markup</div>
    <div class="markup-row">
      <span>Price</span>
      <input type="range" id="markup" min="-50" max="300" value="0" step="5">
      <span class="mval" id="markupVal">0%</span>
    </div>
    <span class="tog" onclick="toggleAdv()">▸ Advanced Filters</span>
    <div class="adv" id="advSec">
      <div class="sec-title">Magic Types</div>
      <div class="check-grid" id="magicTypes"></div>
      <div class="sec-title">Categories</div>
      <div class="check-grid" id="categories"></div>
    </div>
    <button class="gen-btn" onclick="generateShop()">⚔ Generate Shop</button>
  </div>

  <div class="results-panel">
    <div class="rh">
      <div class="rt">Shop Inventory</div>
      <div class="rc" id="rc"></div>
    </div>
    <div id="results"><div class="empty">Set your quantities and click Generate Shop to stock the shelves...</div></div>
  </div>
</div>
</div>

// Dice parser: supports integer, NdM, NdM±K
function parseDice(expr){
  const s=String(expr||'').trim().replace(/\s/g,'').toLowerCase();
  if(!s||s==='0')return{valid:true,roll:()=>0};
  if(/^\d+$/.test(s)){const n=parseInt(s);return{valid:true,roll:()=>Math.min(10,n)};}
  const m=s.match(/^(\d+)d(\d+)([+-]\d+)?$/);
  if(!m)return{valid:false};
  const num=parseInt(m[1]),die=parseInt(m[2]),mod=m[3]?parseInt(m[3]):0;
  return{valid:true,roll:()=>{let t=mod;for(let i=0;i<num;i++)t+=Math.floor(Math.random()*die)+1;return Math.max(0,Math.min(10,t));}};
}

function fmtPrice(cp){
  if(cp<100)return cp+' cp';
  const sp=cp/10;
  if(sp<100)return(sp%10===0?sp:sp.toFixed(1))+' sp';
  const gp=cp/100;
  if(gp>=1000)return Math.round(gp).toLocaleString()+' gp';
  return gp.toFixed(gp<10?1:0)+' gp';
}
function getChecked(id){return Array.from(document.querySelectorAll('#'+id+' input:checked')).map(e=>e.value);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildUI(){
  const cont=document.getElementById('rarity-inputs');
  RARITIES.forEach(r=>{
    const b=document.createElement('div');b.className='rarity-block';
    b.innerHTML=`<div class="rarity-row"><span class="rlabel ${r}">${RLABELS[r]}</span><input class="dice-input" id="di_${r}" type="text" value="0" placeholder="e.g. 2d4-2" autocomplete="off" spellcheck="false" oninput="validate('${r}')"></div><div class="dice-hints">${HINTS.map(h=>`<button class="hbtn" onclick="setD('${r}','${h}')">${h}</button>`).join('')}</div>`;
    cont.appendChild(b);
  });
  const mt=document.getElementById('magicTypes');
  MTYPES.forEach(t=>{mt.innerHTML+=`<label class="ci"><input type="checkbox" value="${t}" checked>${t}</label>`;});
  const ct=document.getElementById('categories');
  CATS.forEach(c=>{ct.innerHTML+=`<label class="ci"><input type="checkbox" value="${c}" checked>${c}</label>`;});
}

function setD(r,v){const e=document.getElementById('di_'+r);e.value=v;e.classList.remove('invalid');}
function validate(r){const e=document.getElementById('di_'+r);const p=parseDice(e.value);e.classList.toggle('invalid',e.value.trim()!==''&&!p.valid);}
function applyPreset(k){const p=PRESETS[k];RARITIES.forEach(r=>setD(r,p[r]||'0'));}
function toggleAdv(){const s=document.getElementById('advSec'),l=document.querySelector('.tog');s.classList.toggle('open');l.textContent=s.classList.contains('open')?'▾ Advanced Filters':'▸ Advanced Filters';}

document.getElementById('markup').addEventListener('input',function(){
  const v=parseInt(this.value);document.getElementById('markupVal').textContent=(v>=0?'+':'')+v+'%';
});

function generateShop(){
  const mk=parseInt(document.getElementById('markup').value)/100;
  const addP=document.getElementById('addPotions').checked;
  const aT=getChecked('magicTypes'),aC=getChecked('categories');
  const res={};let total=0;

  RARITIES.forEach(r=>{
    const p=parseDice(document.getElementById('di_'+r).value);
    if(!p||!p.valid)return;
    const cnt=p.roll();if(!cnt)return;
    let pool=ITEMS.filter(i=>{
      if(i.rarity!==r)return false;
      if(r==='mundane')return true;
      return aT.includes(i.type)&&aC.includes(i.category);
    });
    if(!pool.length)return;
    shuffle(pool);
    res[r]=pool.slice(0,cnt).map(i=>i.s?{...i,_spell:rspell(SLVL[i.name]??0)}:i);
    total+=res[r].length;
  });

  if(addP){
    const p=ITEMS.find(i=>i.name==='Potion of Healing');
    if(p){if(!res.common)res.common=[];if(!res.common.find(i=>i.name==='Potion of Healing')){res.common.unshift(p);total++;}}
  }

  document.getElementById('rc').textContent=total+' item'+(total!==1?'s':'');

  if(!total){document.getElementById('results').innerHTML='<div class="empty">No items found. Adjust your filters or quantities.</div>';return;}

  const BDGE={mundane:'bm',common:'bc',uncommon:'bu',rare:'br','very-rare':'bvr',legendary:'bl'};
  let html='';
  RARITIES.forEach(r=>{
    const list=res[r];if(!list||!list.length)return;
    html+=`<div class="rsec"><div class="rsec-hdr"><span class="rbadge ${BDGE[r]}">${RLABELS[r].toUpperCase()}</span><span style="font-size:.8rem;color:var(--text-dim)">${list.length} item${list.length!==1?'s':''}</span></div><div class="ig">`;
    list.forEach(item=>{
      const price=Math.round(item.price*(1+mk));
      const isrc=item.rarity==='mundane'?'xphb':'xdmg';
      const ilink=`https://5e.tools/items.html#${encodeURIComponent(item.name.toLowerCase())}_${isrc}`;
      let spellHtml='';
      if(item._spell){
        // Spells not in XPHB (XGE=xge, TCE=tce, etc.)
        const SPELL_SRC={'Aganazzar\'s Scorcher':'xge','Beast Bond':'xge','Bones of the Earth':'xge','Catapult':'xge','Cause Fear':'xge','Control Flames':'xge','Create Bonfire':'xge','Dust Devil':'xge','Earthbind':'xge','Elemental Bane':'xge','Enemies Abound':'xge','Erupting Earth':'xge','Far Step':'xge','Flame Arrows':'xge','Frostbite':'xge','Gust':'xge','Healing Spirit':'xge','Infestation':'xge','Investiture of Flame':'xge','Investiture of Ice':'xge','Investiture of Stone':'xge','Investiture of Wind':'xge','Life Transference':'xge','Maximilian\'s Earthen Grasp':'xge','Melf\'s Minute Meteors':'xge','Mind Spike':'xge','Primal Savagery':'xge','Primordial Ward':'xge','Pyrotechnics':'xge','Shadow Blade':'xge','Shape Water':'xge','Skywrite':'xge','Snilloc\'s Snowball Swarm':'xge','Storm Sphere':'xge','Sudden Awakening':'xge','Sword Burst':'xge','Thunder Step':'xge','Tidal Wave':'xge','Transmute Rock':'xge','Vitriolic Sphere':'xge','Wall of Sand':'xge','Wall of Water':'xge','Warding Wind':'xge','Watery Sphere':'xge','Word of Radiance':'xge','Zephyr Strike':'xge',
          'Borrowed Knowledge':'scc','Nathair\'s Mischief':'ftd','Raulothim\'s Psychic Lance':'ftd','Summon Draconic Spirit':'ftd',
          'Booming Blade':'tce','Green-Flame Blade':'tce','Intellect Fortress':'tce','Mind Sliver':'tce','Spirit Shroud':'tce','Summon Aberration':'tce','Summon Beast':'tce','Summon Celestial':'tce','Summon Construct':'tce','Summon Elemental':'tce','Summon Fey':'tce','Summon Fiend':'tce','Summon Greater Demon':'tce','Summon Lesser Demons':'tce','Summon Shadow Demon':'tce','Summon Undead':'tce','Tasha\'s Caustic Brew':'tce','Tasha\'s Mind Whip':'tce','Tasha\'s Otherworldly Guise':'tce','Vortex Warp':'tce','Wristpocket':'tce',
          'Blade of Disaster':'tce','Dream of the Blue Veil':'tce','Ravenous Void':'egw','Reality Break':'egw','Time Ravage':'egw','Tether Essence':'egw',
          'Dark Star':'egw','Gravity Sinkhole':'egw','Psychic Scream':'xge','Encode Thoughts':'ggr','Fortune\'s Favor':'egw','Incite Greed':'acok',
          'Danse Macabre':'xge','Negative Energy Flood':'xge','Power Word Pain':'xge','Temple of the Gods':'xge','Whirlwind':'xge'};
        const ssrc=SPELL_SRC[item._spell]||'xphb';
        const slink=`https://5e.tools/spells.html#${encodeURIComponent(item._spell.toLowerCase())}_${ssrc}`;
        spellHtml=`<div class="ispell">✦ <a href="${slink}" target="_blank">${item._spell}</a></div>`;
      }
      html+=`<div class="icard"><div class="iname"><a href="${ilink}" target="_blank">${item.name}</a></div>${spellHtml}<div class="itype">${item.type}${item.category&&item.category!=='Nonmagical'?' · '+item.category:''}</div><div class="iprice">${fmtPrice(price)}</div>${item.attune?'<div class="iatt">Requires attunement</div>':''}</div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('results').innerHTML=html;
}

buildUI();
